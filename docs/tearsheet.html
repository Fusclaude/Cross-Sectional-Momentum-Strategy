<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Signal Research — Tearsheet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E1A;--p1:#0F1525;--p2:#141C30;--p3:#1B2540;
  --bdr:#23304D;--bdr2:#2E3E5E;
  --teal:#00D4AA;--tglow:rgba(0,212,170,.14);
  --amber:#F5A623;--ad:rgba(245,166,35,.10);
  --green:#26D07C;--gd:rgba(38,208,124,.12);
  --red:#FF5C5C;--rd:rgba(255,92,92,.12);
  --blue:#4D9FFF;--purple:#A78BFA;
  --t1:#EAF0FB;--t2:#8A9CBC;--t3:#4A5B7A;
  --mono:"JetBrains Mono",monospace;--sans:"Inter",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:14px;background:var(--bg)}
body{font-family:var(--sans);color:var(--t1);min-height:100vh;padding-bottom:40px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.hdr{position:sticky;top:0;z-index:200;background:var(--p1);border-bottom:1px solid var(--bdr);padding:9px 14px}
.hdr-row{display:flex;align-items:center;gap:8px}
.logo{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--teal);letter-spacing:.04em}
.stamp{font-family:var(--mono);font-size:9px;color:var(--t3);margin-left:auto;text-align:right;line-height:1.5}
.tabs{display:flex;gap:6px;margin-top:8px}
.tab{flex:1;font-family:var(--mono);font-size:12px;font-weight:600;padding:7px;border-radius:7px;
     border:1px solid var(--bdr2);background:var(--p2);color:var(--t2);cursor:pointer;text-align:center}
.tab.active{background:var(--teal);color:var(--bg);border-color:var(--teal)}

.wrap{padding:12px;max-width:900px;margin:0 auto}
.sec{margin-bottom:22px}
.sec-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.sec-t{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--teal);text-transform:uppercase}
.sec-n{font-family:var(--mono);font-size:9px;color:var(--t3)}
.sec-d{font-size:10px;color:var(--t2);line-height:1.65;margin-bottom:10px}

/* ── SIGNATURE: the verdict + evidence ledger ── */
.verdict{border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid}
.verdict.fail{background:var(--rd);border-color:rgba(255,92,92,.35)}
.verdict.weak{background:var(--ad);border-color:rgba(245,166,35,.35)}
.verdict.pass{background:var(--gd);border-color:rgba(38,208,124,.35)}
.verdict-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--t2);text-transform:uppercase}
.verdict-h{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.01em;margin:5px 0 7px;line-height:1.05}
.verdict.fail .verdict-h{color:var(--red)}
.verdict.weak .verdict-h{color:var(--amber)}
.verdict.pass .verdict-h{color:var(--green)}
.verdict-p{font-size:11px;line-height:1.7;color:var(--t1);opacity:.9}

.ledger{border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.lrow{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;
      padding:11px 12px;border-bottom:1px solid var(--bdr);background:var(--p2)}
.lrow:last-child{border-bottom:none}
.ltest{min-width:0}
.lname{font-size:11px;font-weight:600;color:var(--t1)}
.lthr{font-family:var(--mono);font-size:8.5px;color:var(--t3);margin-top:2px;line-height:1.5}
.lval{font-family:var(--mono);font-size:13px;font-weight:700;text-align:right;white-space:nowrap}
.lflag{font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.08em;padding:3px 7px;
       border-radius:4px;white-space:nowrap;min-width:52px;text-align:center}
.f-pass{color:var(--green);background:var(--gd)}
.f-weak{color:var(--amber);background:var(--ad)}
.f-fail{color:var(--red);background:var(--rd)}

.card{background:var(--p2);border:1px solid var(--bdr);border-radius:10px;padding:13px;margin-bottom:10px}
.note{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:8px;
      padding:11px 12px;font-size:10px;color:var(--amber);line-height:1.7}
.note b{color:#FFCB6B}

table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px}
th{text-align:right;color:var(--t3);font-weight:600;padding:6px 5px;border-bottom:1px solid var(--bdr2);
   font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:6px 5px;border-bottom:1px solid var(--bdr);text-align:right;white-space:nowrap;color:var(--t1)}
tr:last-child td{border-bottom:none}
.tname{color:var(--t1);font-family:var(--sans);font-size:10.5px;font-weight:500}
.dim{color:var(--t3)}
.pos{color:var(--green)}.neg{color:var(--red)}.mut{color:var(--t2)}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

.icbar{height:5px;border-radius:3px;background:var(--p3);position:relative;min-width:54px;overflow:hidden}
.icbar i{position:absolute;top:0;bottom:0;left:50%;display:block}
.mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--bdr2)}

.heat{border-collapse:separate;border-spacing:2px;font-size:8.5px}
.heat td,.heat th{padding:0;border:none}
.heat th{font-size:7.5px;color:var(--t3);padding:2px}
.heat .hc{width:30px;height:24px;border-radius:3px;text-align:center;vertical-align:middle;
          font-family:var(--mono);font-weight:600;color:var(--t1)}
.heat .rl{text-align:right;padding-right:6px;color:var(--t2);font-family:var(--mono);font-size:8.5px}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:9px;color:var(--t3);font-family:var(--mono)}
.legend span{display:flex;align-items:center;gap:4px}
.sw{width:9px;height:9px;border-radius:2px;display:inline-block}

svg{display:block;width:100%;overflow:visible}
.axis{stroke:var(--bdr2);stroke-width:1}
.gridln{stroke:var(--bdr);stroke-width:1;stroke-dasharray:2 3}
.axlbl{font-family:var(--mono);font-size:8px;fill:var(--t3)}

.pick{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.pick:last-child{border-bottom:none}
.pk-t{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t1);width:70px;flex-shrink:0}
.pk-s{font-size:9px;color:var(--t3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pk-w{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--teal)}
.pk-c{font-family:var(--mono);font-size:8px;color:var(--t3);padding:2px 6px;background:var(--p3);border-radius:4px}

.err{padding:40px 16px;text-align:center;color:var(--t2);font-size:11px;line-height:1.8}
.err code{font-family:var(--mono);color:var(--teal);font-size:10px}
.foot{font-size:9px;color:var(--t3);line-height:1.8;padding:14px 0 0;border-top:1px solid var(--bdr);margin-top:8px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <span class="logo">SIGNAL RESEARCH</span>
    <span class="stamp" id="stamp">loading…</span>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="wrap" id="root">
  <div class="err">Loading <code>data/analytics.json</code>…</div>
</div>

<script>
"use strict";

/* ═══════════════════════════════════════════════════════════════════════
   Thresholds. These are the bar a signal has to clear, written down BEFORE
   looking at the results — which is the only way a threshold means anything.
   Sources: IC/ICIR conventions from Grinold & Kahn; DSR from Bailey &
   Lopez de Prado (2014); PBO from Bailey, Borwein, Lopez de Prado & Zhu (2015).
   ═══════════════════════════════════════════════════════════════════════ */
const GATES = {
  ic:      {pass:0.03, weak:0.015},
  tstat:   {pass:2.5,  weak:1.96},
  icir:    {pass:0.5,  weak:0.25},
  dsr:     {pass:0.95, weak:0.80},
  pbo:     {pass:0.30, weak:0.50, invert:true},
  mono:    {pass:0.70, weak:0.40},
  periods: {pass:250,  weak:120}
};

let DATA = null, MARKET = "sp500";

const fmt  = (v,d=2)=> (v==null||!isFinite(v)) ? "—" : Number(v).toFixed(d);
const pct  = (v,d=1)=> (v==null||!isFinite(v)) ? "—" : (v*100).toFixed(d)+"%";
const esc  = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function grade(val, gate){
  if(val==null || !isFinite(val)) return "fail";
  const v = gate.invert ? -val : val;
  const p = gate.invert ? -gate.pass : gate.pass;
  const w = gate.invert ? -gate.weak : gate.weak;
  return v>=p ? "pass" : (v>=w ? "weak" : "fail");
}
const FLAG = {pass:"PASS", weak:"MARGINAL", fail:"FAIL"};

/* ── Load ────────────────────────────────────────────────────────────── */
async function load(){
  try{
    const r = await fetch("data/analytics.json", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    DATA = await r.json();
  }catch(e){
    document.getElementById("root").innerHTML =
      `<div class="err">Could not load <code>data/analytics.json</code>.<br><br>
       Generate it by running <code>python scripts/build_analytics.py</code>,
       then serve this folder over HTTP — opening the file directly with
       <code>file://</code> blocks the fetch.<br><br>
       <span class="dim">${esc(e.message)}</span></div>`;
    return;
  }
  const keys = Object.keys(DATA.markets||{});
  if(!keys.length){ document.getElementById("root").innerHTML =
      '<div class="err">analytics.json contains no markets.</div>'; return; }
  MARKET = keys.includes("sp500") ? "sp500" : keys[0];

  document.getElementById("stamp").innerHTML =
    `${esc((DATA.generatedAt||"").slice(0,10))}<br>cfg ${esc(DATA.configHash||"—")}`;
  document.getElementById("tabs").innerHTML = keys.map(k=>
    `<button class="tab${k===MARKET?" active":""}" data-mk="${esc(k)}">${
      k==="sp500"?"S&amp;P 500":k==="asx300"?"ASX 300":esc(k.toUpperCase())}</button>`).join("");
  document.getElementById("tabs").addEventListener("click", e=>{
    const b = e.target.closest(".tab"); if(!b) return;
    MARKET = b.dataset.mk;
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t===b));
    render();
  });
  render();
}

/* ── Verdict ─────────────────────────────────────────────────────────── */
function baseline(m){
  const c = m.candidates||{};
  return c.legacy_8factor || c[Object.keys(c)[0]] || {};
}

function verdictBlock(m){
  const b = baseline(m), ic = b.ic||{}, bt = b.backtest||{}, ds = b.deflated_sharpe||{};
  const g = {
    ic: grade(Math.abs(ic.ic_mean), GATES.ic),
    t:  grade(Math.abs(ic.t_stat),  GATES.tstat),
    dsr:grade(ds.dsr,               GATES.dsr),
    pbo:grade((m.pbo||{}).pbo,      GATES.pbo),
    n:  grade(ic.n_periods,         GATES.periods)
  };
  const vals = Object.values(g);
  const nFail = vals.filter(v=>v==="fail").length;
  const nPass = vals.filter(v=>v==="pass").length;

  let cls, head, body;
  if(nFail>=3){
    cls="fail"; head="NOT SUPPORTED";
    body="The current blend shows no reliable predictive power on this market over this sample. "+
         "The backtest return is consistent with selection among many configurations rather than a repeatable edge.";
  }else if(nPass>=4){
    cls="pass"; head="SUPPORTED";
    body="The signal clears every pre-registered gate. Treat this as evidence the edge is real, "+
         "not as a forecast — the gates bound how wrong you are likely to be, not how much you will make.";
  }else{
    cls="weak"; head="NOT PROVEN";
    body="Some evidence of predictive power, but it does not clear the bar for a signal you would size with confidence. "+
         "The honest reading is that the sample is too short to separate skill from luck.";
  }
  return `<div class="verdict ${cls}">
      <div class="verdict-lbl">Verdict · ${esc(MARKET.toUpperCase())} · legacy 8-factor blend</div>
      <div class="verdict-h">${head}</div>
      <div class="verdict-p">${body}</div></div>`;
}

function ledgerRow(name, thr, valTxt, g){
  return `<div class="lrow"><div class="ltest">
      <div class="lname">${name}</div><div class="lthr">${thr}</div></div>
      <div class="lval ${g==="pass"?"pos":g==="fail"?"neg":"mut"}">${valTxt}</div>
      <div class="lflag f-${g}">${FLAG[g]}</div></div>`;
}

function ledgerBlock(m){
  const b = baseline(m), ic = b.ic||{}, bk = b.buckets||{}, ds = b.deflated_sharpe||{},
        bt = b.backtest||{}, pbo = m.pbo||{};
  let h = '<div class="ledger">';
  h += ledgerRow("Information coefficient",
        "rank IC vs 4-week forward return · pass ≥ 0.030",
        fmt(ic.ic_mean,4), grade(Math.abs(ic.ic_mean), GATES.ic));
  h += ledgerRow("IC significance",
        "Newey–West t-stat, 4 lags · pass ≥ 2.5",
        fmt(ic.t_stat,2), grade(Math.abs(ic.t_stat), GATES.tstat));
  h += ledgerRow("IC consistency (ICIR)",
        "mean IC / std IC · pass ≥ 0.50",
        fmt(ic.ic_ir,3), grade(Math.abs(ic.ic_ir), GATES.icir));
  h += ledgerRow("Decile monotonicity",
        "rank corr of decile means vs decile · pass ≥ 0.70",
        fmt(bk.monotonicity_rho,2), grade(bk.monotonicity_rho, GATES.mono));
  h += ledgerRow("Deflated Sharpe ratio",
        `deflated for ${ds.n_trials||"—"} trials · pass ≥ 0.95`,
        fmt(ds.dsr,3), grade(ds.dsr, GATES.dsr));
  h += ledgerRow("Backtest overfitting (PBO)",
        "CSCV · LOWER is better · pass ≤ 0.30",
        fmt(pbo.pbo,2), grade(pbo.pbo, GATES.pbo));
  h += ledgerRow("Sample adequacy",
        "usable weekly cross-sections · pass ≥ 250",
        ic.n_periods!=null ? String(ic.n_periods) : "—",
        grade(ic.n_periods, GATES.periods));
  // Breakeven cost is gross alpha divided by turnover. On a short, likely
  // overfit sample the gross alpha is inflated, so an enormous breakeven is
  // evidence the backtest is unrealistic — not evidence the strategy is
  // robust to costs. Anything above ~300bp is reported as implausible rather
  // than allowed to score a pass it has not earned.
  const be = bt.breakeven_cost_bps;
  h += ledgerRow("Survives costs",
        be!=null && be>300
          ? "gross alpha implausible for this sample — figure not meaningful"
          : "breakeven round-trip cost · pass ≥ 60bp",
        be!=null ? fmt(be,0)+"bp" : "—",
        be==null ? "fail" : be>300 ? "weak" : be>60 ? "pass" : be>25 ? "weak" : "fail");
  return h + "</div>";
}

/* ── Caveats, driven by the data itself ──────────────────────────────── */
function caveatBlock(m){
  const dq = m.data_quality||{}, items = [];
  items.push(`<b>Survivorship bias is present.</b> ${esc(dq.survivorship_bias||"")}`);
  const n = (baseline(m).ic||{}).n_periods;
  if(n!=null && n<250) items.push(
    `<b>Sample is short.</b> ${n} usable cross-sections. The standard error on an IC estimate `+
    `over ${n} periods is roughly ${(1/Math.sqrt(n)).toFixed(3)}, which is wider than any real `+
    `equity factor's IC. Nothing here is conclusive — including results that look good.`);
  if(dq.universe_used_fallback) items.push(
    "<b>Universe came from the cached fallback,</b> not a live constituent fetch. Membership may be stale.");
  if(dq.tickers_stale_4w>0) items.push(
    `<b>${dq.tickers_stale_4w} tickers show 4+ weeks of identical prices,</b> which usually means a dead feed rather than a quiet stock.`);
  if(dq.weekly_moves_over_50pct>0) items.push(
    `<b>${dq.weekly_moves_over_50pct} weekly moves exceed ±50%.</b> Worth checking for unadjusted splits.`);
  return `<div class="note">${items.map(i=>"• "+i).join("<br><br>")}</div>`;
}

/* ── Factor IC table ─────────────────────────────────────────────────── */
function factorTable(m){
  const rows = Object.entries(m.factors||{}).map(([k,v])=>{
    const ic = (v.ic||{})["4w"]||{};
    return {k, ic:ic.ic_mean, t:ic.t_stat, ir:ic.ic_ir, hit:ic.hit_rate,
            ac:(v.autocorr_4w||{}).autocorr};
  }).filter(r=>r.ic!=null).sort((a,b)=>Math.abs(b.ic)-Math.abs(a.ic));
  if(!rows.length) return "";
  const max = Math.max(...rows.map(r=>Math.abs(r.ic))) || 1;

  return `<div class="card scroll"><table>
    <thead><tr><th>Factor</th><th>IC 4w</th><th></th><th>t</th><th>ICIR</th><th>Hit</th><th>AC 4w</th></tr></thead>
    <tbody>${rows.map(r=>{
      const w = Math.abs(r.ic)/max*50, sig = Math.abs(r.t)>=1.96;
      const col = r.ic>0 ? "var(--green)" : "var(--red)";
      return `<tr>
        <td class="tname${sig?"":" dim"}">${esc(r.k)}</td>
        <td class="${r.ic>0?"pos":"neg"}">${fmt(r.ic,4)}</td>
        <td style="width:60px"><span class="icbar"><i style="${
          r.ic>0?`left:50%;width:${w}%`:`right:50%;left:auto;width:${w}%`
        };background:${col};opacity:${sig?1:.35}"></i><span class="mid"></span></span></td>
        <td class="${sig?(r.ic>0?"pos":"neg"):"dim"}">${fmt(r.t,2)}</td>
        <td class="mut">${fmt(r.ir,2)}</td>
        <td class="mut">${pct(r.hit,0)}</td>
        <td class="mut">${fmt(r.ac,2)}</td></tr>`;
    }).join("")}</tbody></table>
    <div class="legend">
      <span><i class="sw" style="background:var(--green)"></i>positive IC</span>
      <span><i class="sw" style="background:var(--red)"></i>negative IC</span>
      <span><i class="sw" style="background:var(--t3)"></i>|t| &lt; 1.96 — indistinguishable from noise</span>
    </div></div>`;
}

/* ── Correlation heatmap ─────────────────────────────────────────────── */
function heatColor(v){
  if(v==null) return "var(--p3)";
  const a = Math.min(Math.abs(v),1)*.72+.06;
  return v>=0 ? `rgba(0,212,170,${a})` : `rgba(255,92,92,${a})`;
}
function heatmap(m){
  const C = m.factor_correlation||{}, keys = Object.keys(C);
  if(keys.length<2) return "";
  const short = k => k.replace("info_discreteness","fip").replace("mom_vol_scaled","rmMom")
                      .replace("pct_52w_high","52wH").replace("st_reversal","rev")
                      .replace("resid_mom","rMom").replace("low_vol","loVol");
  return `<div class="card scroll"><table class="heat">
    <thead><tr><th></th>${keys.map(k=>`<th>${esc(short(k))}</th>`).join("")}</tr></thead>
    <tbody>${keys.map(a=>`<tr><td class="rl">${esc(short(a))}</td>${
      keys.map(b=>{const v=(C[a]||{})[b];
        return `<td class="hc" style="background:${heatColor(v)}">${v==null?"":fmt(v,1).replace("0.",".")}</td>`;
      }).join("")}</tr>`).join("")}</tbody></table>
    <div class="legend"><span><i class="sw" style="background:rgba(0,212,170,.7)"></i>+1 same bet</span>
      <span><i class="sw" style="background:var(--p3)"></i>0 independent</span>
      <span><i class="sw" style="background:rgba(255,92,92,.7)"></i>−1 opposed</span></div></div>`;
}

/* ── Candidate comparison ────────────────────────────────────────────── */
function candidateTable(m){
  const rows = Object.entries(m.candidates||{})
    .filter(([,v])=>v.backtest && !v.backtest.error)
    .map(([k,v])=>({k, ic:(v.ic||{}).ic_mean, t:(v.ic||{}).t_stat,
      sh:v.backtest.sharpe, dd:v.backtest.max_drawdown, dsr:(v.deflated_sharpe||{}).dsr,
      to:v.backtest.annual_turnover, mono:(v.buckets||{}).monotonicity_rho}))
    .sort((a,b)=>(b.dsr??-1)-(a.dsr??-1));
  if(!rows.length) return "";
  return `<div class="card scroll"><table>
    <thead><tr><th>Configuration</th><th>IC</th><th>t</th><th>Mono</th><th>Sharpe</th><th>Max DD</th><th>Turn</th><th>DSR</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td class="tname">${esc(r.k.replace(/_/g," "))}</td>
      <td class="${r.ic>0?"pos":"neg"}">${fmt(r.ic,3)}</td>
      <td class="${Math.abs(r.t)>=1.96?"":"dim"}">${fmt(r.t,2)}</td>
      <td class="mut">${fmt(r.mono,2)}</td>
      <td>${fmt(r.sh,2)}</td>
      <td class="neg">${pct(r.dd,0)}</td>
      <td class="mut">${fmt(r.to,1)}x</td>
      <td class="${grade(r.dsr,GATES.dsr)==="pass"?"pos":grade(r.dsr,GATES.dsr)==="fail"?"neg":"mut"}">${fmt(r.dsr,2)}</td>
    </tr>`).join("")}</tbody></table>
    <div class="legend"><span>Sorted by deflated Sharpe. Sharpe alone ranks the luckiest, not the best.</span></div></div>`;
}

/* ── Decile chart ────────────────────────────────────────────────────── */
function decileChart(m){
  const bk = baseline(m).buckets;
  if(!bk || !bk.buckets) return "";
  const b = bk.buckets, W=340,H=130,pad=22;
  const vals = b.map(x=>x.mean_fwd_ret), lo=Math.min(0,...vals), hi=Math.max(0,...vals);
  const rng = (hi-lo)||1, y0 = H-pad-((0-lo)/rng)*(H-pad*1.6);
  const bw = (W-pad*2)/b.length;
  const bars = b.map((x,i)=>{
    const y = H-pad-((x.mean_fwd_ret-lo)/rng)*(H-pad*1.6);
    const top = Math.min(y,y0), h = Math.max(Math.abs(y-y0),1);
    const c = x.mean_fwd_ret>=0 ? "var(--teal)":"var(--red)";
    return `<rect x="${pad+i*bw+2}" y="${top}" width="${bw-4}" height="${h}" fill="${c}" opacity=".85" rx="2"/>`;
  }).join("");
  const labs = b.map((x,i)=> (i===0||i===b.length-1)
      ? `<text class="axlbl" x="${pad+i*bw+bw/2}" y="${H-7}" text-anchor="middle">${i===0?"low":"high"}</text>`:"").join("");
  return `<div class="card">
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="mean forward return by score decile">
      <line class="axis" x1="${pad}" y1="${y0}" x2="${W-pad}" y2="${y0}"/>
      ${bars}${labs}
      <text class="axlbl" x="${pad}" y="12">mean 4w fwd return by score decile</text>
    </svg>
    <div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-top:6px">
      Spread ${pct(bk.spread_mean,2)} · t ${fmt(bk.spread_t_stat,2)} · monotonicity ρ ${fmt(bk.monotonicity_rho,2)}.
      A real factor produces a staircase. A spread carried by the top bar alone is usually one sector or a few microcaps.
    </div></div>`;
}

/* ── Equity curve ────────────────────────────────────────────────────── */
function equityChart(m){
  const bt = baseline(m).backtest;
  if(!bt || !bt.equity_curve || bt.equity_curve.length<4) return "";
  const pts = bt.equity_curve, W=340,H=140,pad=24;
  const navs = pts.map(p=>p.nav), lo=Math.min(...navs), hi=Math.max(...navs), rng=(hi-lo)||1;
  const X = i => pad + i/(pts.length-1)*(W-pad*1.4);
  const Y = v => H-pad-((v-lo)/rng)*(H-pad*1.7);
  const d = pts.map((p,i)=>`${i?"L":"M"}${X(i).toFixed(1)},${Y(p.nav).toFixed(1)}`).join("");
  const area = d+`L${X(pts.length-1).toFixed(1)},${H-pad}L${X(0).toFixed(1)},${H-pad}Z`;
  return `<div class="card">
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="strategy equity curve">
      <line class="gridln" x1="${pad}" y1="${Y(1)}" x2="${W-pad*.4}" y2="${Y(1)}"/>
      <path d="${area}" fill="var(--tglow)"/>
      <path d="${d}" fill="none" stroke="var(--teal)" stroke-width="1.6"/>
      <text class="axlbl" x="${pad}" y="12">growth of 1.00, net of costs</text>
      <text class="axlbl" x="${W-pad*.4}" y="${Y(hi)-4}" text-anchor="end">${fmt(hi,2)}</text>
    </svg>
    <div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-top:6px">
      CAGR ${pct(bt.cagr,1)} · vol ${pct(bt.vol_ann,1)} · Sharpe ${fmt(bt.sharpe,2)} ·
      max DD ${pct(bt.max_drawdown,1)} · turnover ${fmt(bt.annual_turnover,1)}x/yr ·
      cost drag ${pct(bt.total_cost_drag_ann,2)}/yr
      ${bt.benchmark ? ` · IR ${fmt(bt.benchmark.information_ratio,2)} (t ${fmt(bt.benchmark.active_t_stat,2)})` : ""}
    </div></div>`;
}

/* ── Render ──────────────────────────────────────────────────────────── */
function sec(title, n, desc, body){
  if(!body) return "";
  return `<div class="sec"><div class="sec-hd"><span class="sec-t">${title}</span>
    <span class="sec-n">${n}</span></div><div class="sec-d">${desc}</div>${body}</div>`;
}

function render(){
  const m = DATA.markets[MARKET];
  const dq = m.data_quality||{};
  document.getElementById("root").innerHTML =
    verdictBlock(m) +
    sec("Evidence ledger","8 tests",
      "Each test was given a threshold before the results were looked at. A signal is only as good as the "+
      "test it was most likely to fail.", ledgerBlock(m)) +
    sec("Read this first","caveats",
      "Limitations that bound every number on this page.", caveatBlock(m)) +
    sec("Factor diagnostics", Object.keys(m.factors||{}).length+" factors",
      "Rank correlation between each factor and the 4-week forward return, averaged across cross-sections. "+
      "AC is 4-week rank autocorrelation — it sets how much the book churns, and therefore what it costs to run.",
      factorTable(m)) +
    sec("Factor overlap","correlation",
      "Average cross-sectional rank correlation. Factors correlated above ~0.8 are one bet counted twice; "+
      "splitting weight between them adds cost, not diversification.", heatmap(m)) +
    sec("Configurations tried", (m.pbo||{}).n_trials ? (m.pbo.n_trials+" incl. randomised") : "",
      "Every configuration evaluated, so the search space is visible rather than hidden. This is what the "+
      "deflated Sharpe corrects for.", candidateTable(m)) +
    sec("Cross-section","deciles", "Does the effect hold across the whole universe, or only at the extreme?",
      decileChart(m)) +
    sec("Backtest","net of costs",
      "Equal-weight top-N, rebalanced on schedule, costs charged on realised turnover. Positions are formed "+
      "on week t and earn from t+1, so there is no same-bar lookahead.", equityChart(m)) +
    `<div class="foot">
      Universe ${dq.n_tickers||"—"} names · ${dq.n_dates||"—"} weekly bars ·
      ${esc(dq.first_date||"")} → ${esc(dq.last_date||"")} · ${fmt(dq.missing_pct,2)}% missing.<br>
      Config ${esc(DATA.configHash||"—")} · schema v${esc(String(DATA.schemaVersion||"—"))} ·
      generated ${esc((DATA.generatedAt||"").slice(0,16).replace("T"," "))}.<br><br>
      Research output only. Not investment advice, not a recommendation to trade, and not a forecast.
      Past statistical relationships routinely stop working, and the sample here is short enough that
      several of the numbers above will change materially with more data.
    </div>`;
}

load();
</script>
