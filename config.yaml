# ─────────────────────────────────────────────────────────────────────────────
# config.yaml — single source of truth for the signal engine.
#
# Every number that affects a result lives here, not in code. Each run writes
# a manifest containing the SHA-256 of this file, so any published pick can be
# traced back to the exact parameter set that produced it.
# ─────────────────────────────────────────────────────────────────────────────
schema_version: 2

data:
  # 760 days (~25mo) only just covers the 12-1 lookback, which leaves ~60
  # usable cross-sections for evaluation. That is far too few to estimate an
  # information coefficient with any confidence. 10y is the minimum for
  # research-grade factor statistics; it costs nothing extra from yfinance.
  lookback_days: 3650
  resample: W-FRI          # weekly, Friday close
  # Coverage is measured SINCE EACH TICKER'S FIRST BAR, not across the whole
  # window -- otherwise a 10-year fetch deletes every recent listing.
  min_coverage: 0.30
  # Absolute minimum history. 60 weeks clears the 12-month lookback plus the
  # 1-month skip with a small buffer, which is the real requirement for the
  # signal to be computable.
  min_history_weeks: 60
  benchmark:
    sp500: "^GSPC"
    asx300: "^AXJO"
  risk_free:
    sp500: "^IRX"          # 13-week T-bill, annualised %
    asx300: null           # no free AU equivalent; falls back to flat rate
  risk_free_fallback: 0.0425

quality:
  # Calibrated for a MULTI-YEAR panel. The previous thresholds were tuned on a
  # 2-year sample and counted raw occurrences across all history, so they fired
  # spuriously once history was extended to 10 years.
  min_weekly_bars: 60
  max_missing_pct: 0.15
  stale_weeks: 4
  # Fail only when tickers are STILL flat at the final bar -- i.e. a live dead
  # feed corrupting today's ranking. Historical flat runs are trading halts,
  # which are normal on the ASX, and are reported as warnings instead.
  max_dead_ticker_pct: 0.02
  max_staleness_days: 10
  # Split detection guards. A stock below the universe screen is not in the
  # investable cross-section, so a data error there cannot affect a ranking.
  # And near the minimum price increment, tick quantisation manufactures exact
  # 2:1 ratios -- an ASX name oscillating between $0.005 and $0.010 looks like
  # a textbook split and is just one tick.
  split_check_min_price: 0.10
  tick_size: 0.001
  split_check_min_ticks: 40
  # Reviewed, known-benign data quirks. Each entry is a decision with a reason,
  # not a silenced check — the gate still runs on every other ticker and the
  # ignored ones are reported as warnings on every run.
  ignore_tickers:
    # LOT.AX (Lotus Resources): two apparent 2:1 splits a fortnight apart in
    # Nov 2018, while trading sub-cent. Splits happen once, not twice; ASX
    # quotes sub-$0.10 names in $0.001 steps, so $0.010 -> $0.005 is one tick
    # and an exact 2:1 ratio. Also far below the $0.02 universe screen at the
    # time, so it was never in the investable cross-section. Reviewed 2026-07.
    - LOT.AX

universe:
  min_price:
    sp500: 0.10
    asx300: 0.05
  # Liquidity screen. Requires volume (fetch_prices.py v2 pulls it).
  # Names below this median 20-day dollar volume are excluded from the
  # investable set — they are untradeable at any meaningful size and
  # inflate backtest returns via microcap bias.
  min_median_dollar_volume:
    # Written as plain integers on purpose. YAML 1.1 requires a signed
    # exponent, so `5.0e6` silently parses as the STRING "5.0e6" while
    # `5.0e+6` parses as a float. Plain digits avoid the trap entirely.
    sp500: 5000000
    asx300: 1000000
  ipo_seasoning_days: 365

factors:
  # weeks-per-month constant, matches the dashboard engine exactly
  weeks_per_month: 4.345
  skip_months: 1
  # Winsorise cross-sectional z-scores at +/- this many sigma before blending.
  # Raw momentum has fat right tails; without this a single 900% microcap
  # dominates the composite.
  winsor_sigma: 3.0
  # Neutralise scores within GICS sector before ranking. Without this the
  # composite is mostly a sector bet -- in 2026 it is essentially a
  # levered long position in semiconductors.
  sector_neutral: true
  vol_halflife_weeks: 13   # EWMA halflife for realised vol / beta

evaluation:
  forward_horizons_weeks: [1, 4, 13, 26]
  n_buckets: 10            # deciles for spread portfolios
  newey_west_lags: 4       # autocorrelation-robust t-stats on overlapping returns
  # Number of distinct configurations tried during research. Feeds the
  # deflated Sharpe ratio. Be honest here -- understating it is how
  # backtest overfitting hides.
  n_trials: 64
  n_random_trials: 48
  purge_weeks: 26          # embargo around test folds in walk-forward CV
  n_folds: 5

portfolio:
  top_n: 5
  max_weight: 0.25
  max_sector_weight: 0.40
  # Cap each position at this fraction of median daily dollar volume, so
  # the backtest cannot assume fills it could never get.
  max_adv_participation: 0.05
  vol_target_annual: 0.18  # ex-ante portfolio vol target; null disables
  rebalance_weeks: 4

costs:
  # Round-trip cost in basis points, applied on turnover.
  # ASX small/mid caps are materially more expensive than US large caps;
  # using one blended number flatters the ASX book.
  spread_bps:
    sp500: 5.0
    asx300: 25.0
  commission_bps: 2.0
  # Square-root market impact: impact_bps = coef * sqrt(participation)
  impact_coef_bps: 40.0