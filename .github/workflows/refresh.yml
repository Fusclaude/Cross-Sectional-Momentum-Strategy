name: Refresh Momentum Signals

# Replaces the old refresh.yml. Same job it always did (fetch, compute, commit,
# deploy Pages) plus three gates that were not there before:
#   1. tests run BEFORE anything is fetched
#   2. fetch_prices.py exits non-zero on a data quality failure
#   3. a sanity check on the outputs before they are allowed to be committed
#
# Schedule moved from Sat 23:00 UTC to Sat 06:00 UTC. The old time was Sunday
# ~09:00 AEST, which is after both closes and fine — but 06:00 UTC is Saturday
# evening AEST and still after Friday's US close, so the data is equally fresh
# and the run lands before your weekend rather than during it. Change it back
# if you prefer; nothing depends on the specific hour.
on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # This is the fix for the five duplicate 2026-06-20 rows. A manual dispatch
  # racing the scheduled run had both jobs appending to picks_history.jsonl.
  # Serialising the workflow removes the race; the idempotent writer removes
  # the damage if one ever slips through anyway.
  group: momentum-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Runs first, deliberately. A lookahead bug must never be able to publish
      # a ranking — failing here costs 10 seconds, failing later costs a week
      # of decisions made on bad numbers.
      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Fetch current universe (S&P 500 + ASX 300)
        run: python scripts/fetch_universe.py

      # Exits non-zero on stale feeds, suspected unadjusted splits, excessive
      # missing data, or a latest bar more than 10 days old.
      - name: Fetch latest prices (data quality gate)
        run: python scripts/fetch_prices.py

      - name: Compute signals and rankings
        run: python scripts/run_signals.py

      - name: Build research analytics
        run: python scripts/build_analytics.py

      - name: Sanity-check outputs
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          sig = json.loads(Path("data/signals_latest.json").read_text())
          ana = json.loads(Path("data/analytics.json").read_text())
          problems = []
          for mk, m in sig["markets"].items():
              if m["universeSize"] < 50:
                  problems.append(f"{mk}: only {m['universeSize']} eligible names")
              if not m.get("book"):
                  problems.append(f"{mk}: empty portfolio book")
              problems += [f"{mk}: {p}" for p in m.get("qualityProblems", [])]
          if sig["manifest"]["configHash"] != ana["configHash"]:
              problems.append("signals and analytics built from different configs")
          if problems:
              print("SANITY CHECK FAILED:")
              for p in problems:
                  print("  -", p)
              sys.exit(1)
          print("Sanity checks passed.")
          PY

      # docs/ is what GitHub Pages serves, so the dashboard and the tearsheet
      # both read their data from docs/data/. This step is why the old workflow
      # existed in this shape -- keep it.
      - name: Copy data into docs/ for the dashboard
        run: |
          mkdir -p docs/data
          cp data/signals_latest.json docs/data/
          cp data/analytics.json      docs/data/
          cp data/picks_history.jsonl docs/data/ 2>/dev/null || true

      - name: Commit updated data
        run: |
          git config user.name  "momentum-bot"
          git config user.email "actions@github.com"
          git add data/ docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh signals $(date -u +%Y-%m-%d)"
            # Rebase, not merge: picks_history.jsonl is rewritten whole by the
            # idempotent writer, so a rebase replays cleanly instead of
            # conflicting on tail lines the way the old append-only file did.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
